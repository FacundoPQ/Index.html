<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SDB — Inventario Total</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  :root { --amarillo: #F5C400; --fondo: #1A1A1A; --sup: #242424; --borde: #3A3A3A; --texto: #F0EDE4; --verde: #3DB85A; --rojo: #E24B4A; --azul: #3498db; --naranja: #e67e22; }
  
  html, body { background: var(--fondo); color: var(--texto); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100%; position: fixed; width: 100%; }

  /* Encabezado y Botones */
  #header-fijo { background: var(--sup); border-bottom: 2px solid var(--amarillo); padding: 8px; z-index: 100; }
  .controles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 8px; }
  .btn-acc { border: none; padding: 12px 0; border-radius: 4px; font-size: 9px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: white; text-align: center; }
  .btn-guardar { background: var(--amarillo); color: black; }
  .btn-dia { background: #555; }
  .btn-sem { background: var(--azul); }
  .btn-mes { background: var(--naranja); }

  /* Contenedor de Tabla con Scroll */
  #contenedor-tabla { 
    overflow-x: auto; 
    overflow-y: auto; 
    height: calc(100vh - 120px); 
    -webkit-overflow-scrolling: touch;
    background: var(--fondo);
  }

  table { width: 1200px; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
  
  th { 
    position: sticky; top: 0; background: #2E2E2E; color: var(--amarillo); 
    padding: 12px 5px; text-align: left; font-size: 10px; border-bottom: 2px solid var(--borde); 
    text-transform: uppercase; z-index: 10;
  }

  td { padding: 10px 5px; border-bottom: 1px solid var(--borde); vertical-align: middle; word-wrap: break-word; }

  /* Anchos de Columna */
  .col-nom { width: 180px; font-weight: bold; position: sticky; left: 0; background: var(--fondo); z-index: 5; border-right: 1px solid var(--borde); }
  .col-est { width: 100px; text-align: center; }
  .col-act { width: 100px; text-align: center; color: #888; }
  .col-due { width: 120px; }
  .col-quien { width: 120px; }
  .col-costo { width: 90px; }
  .col-fecha { width: 100px; }
  .col-obs { width: 200px; font-size: 10px; color: #aaa; }
  .col-edit { width: 50px; text-align: center; }

  /* Estilos de Estado */
  .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 9px; }
  .bueno { background: rgba(61,184,90,0.2); color: var(--verde); border: 1px solid var(--verde); }
  .roto { background: rgba(226,75,74,0.2); color: var(--rojo); border: 1px solid var(--rojo); }
  .perdido { background: rgba(255,255,255,0.1); color: #888; border: 1px solid #555; }

  /* Botón Flotante */
  #fab { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--amarillo); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-size: 24px; font-weight: bold; z-index: 100; }

  /* Modales (solo para cargar o editar nombre) */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; }
  .modal { background: var(--sup); width: 90%; max-width: 350px; padding: 20px; border-radius: 10px; border: 1px solid var(--borde); }
  input, select, textarea { width: 100%; background: #000; color: white; border: 1px solid var(--borde); padding: 10px; margin: 8px 0; border-radius: 5px; box-sizing: border-box; }
</style>
</head>
<body>

<div id="header-fijo">
  <div class="controles">
    <button class="btn-acc btn-guardar" onclick="guardarLocal()">Guardar</button>
    <button class="btn-acc btn-dia" onclick="exportarPDF('DIARIO')">Diario</button>
    <button class="btn-acc btn-sem" onclick="exportarPDF('SEMANAL')">Semanal</button>
    <button class="btn-acc btn-mes" onclick="exportarPDF('MENSUAL')">Mensual</button>
  </div>
  <div style="font-size: 10px; color: var(--amarillo); font-weight: bold;">SDB-1165 | INVENTARIO DE HERRAMIENTAS</div>
</div>

<div id="contenedor-tabla">
  <table>
    <thead>
      <tr>
        <th class="col-nom">Herramienta</th>
        <th class="col-est">Estado</th>
        <th class="col-act">Últ. Act.</th>
        <th class="col-due">Dueño</th>
        <th class="col-quien">Lentador</th>
        <th class="col-costo">Costo</th>
        <th class="col-fecha">F. Compra</th>
        <th class="col-obs">Comentarios</th>
        <th class="col-edit">...</th>
      </tr>
    </thead>
    <tbody id="body-tabla"></tbody>
  </table>
</div>

<button id="fab" onclick="abrirCarga()">+</button>

<div class="overlay" id="modal-form">
  <div class="modal">
    <h3 id="modal-tit" style="color:var(--amarillo); margin:0;">Cargar / Editar</h3>
    <input type="text" id="f-nom" placeholder="Nombre (Ej: Amoladora)">
    <select id="f-est">
      <option value="Bueno">Bueno</option>
      <option value="Regular">Regular</option>
      <option value="Roto">Roto</option>
      <option value="Perdido">Perdido</option>
    </select>
    <select id="f-due" onchange="document.getElementById('f-quien').style.display = this.value=='Prestado'?'block':'none'">
      <option value="SDB">Propio SDB</option>
      <option value="Prestado">Prestado</option>
    </select>
    <input type="text" id="f-quien" placeholder="¿Quién prestó?" style="display:none">
    <input type="number" id="f-costo" placeholder="Costo $">
    <input type="date" id="f-fcomp">
    <textarea id="f-obs" placeholder="Observaciones..." rows="2"></textarea>
    <button class="btn-acc btn-guardar" style="width:100%" onclick="procesarForm()">ACEPTAR</button>
    <button class="btn-acc" style="width:100%; background:var(--rojo); margin-top:5px" onclick="eliminarItem()">ELIMINAR</button>
    <button onclick="cerrarModal()" style="width:100%; background:none; color:#888; border:none; margin-top:10px">Cerrar</button>
  </div>
</div>

<script>
// Datos del PDF incorporados [cite: 1, 2, 3, 4, 5, 8, 15, 16, 17, 22, 24, 27, 29, 30, 35, 36]
let db = JSON.parse(localStorage.getItem('sdb_inv_v2')) || [
    {id:1, nom:"Rotopercutora", est:"Bueno", act:"14/04", due:"SDB", quien:"", costo:"", fcomp:"", obs:""},
    {id:2, nom:"Dobladora", est:"Bueno", act:"14/04", due:"SDB", quien:"", costo:"", fcomp:"", obs:""},
    {id:3, nom:"Amoladora Angular Nueva", est:"Bueno", act:"14/04", due:"SDB", quien:"", costo:"", fcomp:"", obs:"Makita [cite: 8]"},
    {id:4, nom:"Martillo Demo. SDS MAX", est:"Bueno", act:"06/02", due:"SDB", quien:"", costo:"", fcomp:"2026-02-06", obs:"NUEVO [cite: 27]"},
    {id:5, nom:"Puntales Metálicos (356)", est:"Bueno", act:"14/04", due:"SDB", quien:"", costo:"", fcomp:"", obs:"+35 prestados [cite: 36]"},
    {id:6, nom:"Tijera Corte Hierro", est:"Perdido", act:"14/04", due:"SDB", quien:"", costo:"", fcomp:"", obs:"PERDIDO [cite: 16]"},
    {id:7, nom:"Amoladora 9' Milwaukee", est:"Bueno", act:"14/04", due:"SDB", quien:"", costo:"", fcomp:"", obs:"[cite: 29]"}
];

let idEdit = null;

function render() {
  const body = document.getElementById('body-tabla');
  body.innerHTML = db.map(h => `
    <tr>
      <td class="col-nom">${h.nom}</td>
      <td class="col-est"><span class="badge ${h.est.toLowerCase()}">${h.est}</span></td>
      <td class="col-act">${h.act}</td>
      <td class="col-due">${h.due}</td>
      <td class="col-quien">${h.quien || '-'}</td>
      <td class="col-costo">$${h.costo || '0'}</td>
      <td class="col-fecha">${h.fcomp || '-'}</td>
      <td class="col-obs">${h.obs}</td>
      <td class="col-edit"><button onclick="abrirEdicion(${h.id})" style="background:none; border:none; color:var(--amarillo)">✏️</button></td>
    </tr>
  `).join('');
}

function abrirCarga() {
  idEdit = null;
  document.getElementById('modal-tit').innerText = "Nueva Herramienta";
  document.getElementById('f-nom').value = "";
  document.getElementById('modal-form').style.display = 'flex';
}

function abrirEdicion(id) {
  idEdit = id;
  const h = db.find(x => x.id === id);
  document.getElementById('modal-tit').innerText = "Editar " + h.nom;
  document.getElementById('f-nom').value = h.nom;
  document.getElementById('f-est').value = h.est;
  document.getElementById('f-due').value = h.due;
  document.getElementById('f-quien').value = h.quien;
  document.getElementById('f-costo').value = h.costo;
  document.getElementById('f-fcomp').value = h.fcomp;
  document.getElementById('f-obs').value = h.obs;
  document.getElementById('modal-form').style.display = 'flex';
}

function procesarForm() {
  const item = {
    nom: document.getElementById('f-nom').value,
    est: document.getElementById('f-est').value,
    due: document.getElementById('f-due').value,
    quien: document.getElementById('f-quien').value,
    costo: document.getElementById('f-costo').value,
    fcomp: document.getElementById('f-fcomp').value,
    obs: document.getElementById('f-obs').value,
    act: new Date().toLocaleDateString('es-AR', {day:'2-digit', month:'2-digit'})
  };

  if(idEdit) {
    const idx = db.findIndex(x => x.id === idEdit);
    db[idx] = { ...db[idx], ...item };
  } else {
    item.id = Date.now();
    db.push(item);
  }
  
  guardarLocal();
  cerrarModal();
  render();
}

function eliminarItem() {
  if(idEdit && confirm("¿Eliminar esta herramienta?")) {
    db = db.filter(x => x.id !== idEdit);
    guardarLocal();
    cerrarModal();
    render();
  }
}

function cerrarModal() { document.getElementById('modal-form').style.display = 'none'; }
function guardarLocal() { localStorage.setItem('sdb_inv_v2', JSON.stringify(db)); }

function exportarPDF(tipo) {
  const el = document.createElement('div');
  el.style.padding = "20px";
  el.style.color = "#000";
  el.innerHTML = `<h2>SDB - REPORTE DE INVENTARIO ${tipo}</h2><p>Fecha: ${new Date().toLocaleDateString()}</p>` + 
                 document.getElementById('contenedor-tabla').innerHTML;
  
  // Ocultar columna de edición en el PDF
  el.querySelectorAll('.col-edit').forEach(c => c.style.display = 'none');
  
  html2pdf().set({
    margin: 5,
    filename: `SDB_Inventario_${tipo}.pdf`,
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
  }).from(el).save();
}

render();
</script>
</body>
</html>
